        name: id
        required: true
        type: integer
      - description: 房间信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rental-management_internal_service.UpdateRoomRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rental-management_internal_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: 更新房间
      tags:
