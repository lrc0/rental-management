  /rooms/{id}/status:
    put:
      consumes:
      - application/json
      description: 更新房间状态
      parameters:
      - description: 房间ID
        in: path
        name: id
        required: true
        type: integer
      - description: 状态
        in: body
        name: request
        required: true
        schema:
          additionalProperties:
            format: int32
            type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rental-management_internal_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: 更新房间状态
      tags:
      - 房间管理
  /tenants:
